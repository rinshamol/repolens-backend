spring.application.name=repolens-backend
server.port=8080

# ===== GitHub API Configuration =====
github.api.base-url=https://api.github.com
github.api.token=${GITHUB_TOKEN:}
github.api.max-files=20
github.api.max-file-size=50000

openrouter.api.base-url=https://openrouter.ai/api/v1
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.api.model=arcee-ai/trinity-large-thinking:free
openrouter.api.timeout=120
openrouter.api.max-retries=2

# ===== OAuth2 Configuration =====
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.github.scope=repo,read:user,user:email,read:org

spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user
spring.security.oauth2.client.provider.github.user-name-attribute=login

# ===== Swagger/OpenAPI Configuration =====
springdoc.swagger-ui.use-root-path=true
springdoc.swagger-ui.oauth.client-id=${GITHUB_CLIENT_ID}
springdoc.swagger-ui.oauth.client-secret=${GITHUB_CLIENT_SECRET}
springdoc.swagger-ui.oauth.use-pkce=true
springdoc.swagger-ui.oauth.scopes=repo,read:user,user:email,read:org

# ===== Logging =====
logging.level.root=INFO
logging.level.com.repolens=DEBUG
logging.level.org.springframework.security=DEBUG

app.redirect-uri=http://localhost:3000
app.frontend-base-url=http://localhost:3000