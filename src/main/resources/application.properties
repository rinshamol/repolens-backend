spring.application.name=repolens-backend
server.port=8080

# GitHub API Configuration
github.api.base-url=https://api.github.com
github.api.token=${GITHUB_TOKEN:}

# DeepSeek API Configuration
deepseek.api.base-url=https://api.deepseek.com
deepseek.api.key=${DEEPSEEK_API_KEY:}
deepseek.api.model=deepseek-chat

# Gemini API
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.0-flash
gemini.api.mock-mode=true

# OpenRouter API Configuration
openrouter.api.base-url=https://openrouter.ai/api/v1
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.api.model=openrouter/free

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.root=INFO
logging.level.com.repolens=DEBUG












